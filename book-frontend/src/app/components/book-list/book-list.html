<div class="container mt-4">

  <h2>Books List</h2>

  <table class="table table-bordered table-striped">

    <thead class="table-dark">

      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Category</th>
        <th>Price</th>
        <th>Status</th>
        <th>Action</th>
      </tr>

    </thead>

    <tbody>

      <tr *ngFor="let book of books">

        <td>{{book.id}}</td>
        <td>{{book.title}}</td>
        <td>{{book.author}}</td>
        <td>{{book.category}}</td>
        <td>{{book.price}}</td>

        <td>
          {{ book.isAvailable ? 'Available' : 'Not Available' }}
        </td>

        <td>

          <button class="btn btn-danger btn-sm"
                  (click)="deleteBook(book.id)">

            Delete

          </button>

        </td>

      </tr>

    </tbody>

  </table>

</div>
